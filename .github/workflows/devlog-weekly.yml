name: weekly devlog secure summary

on:
  schedule:
    - cron: "0 7 * * MON" # Every Monday 07:00 UTC (11:00 Tbilisi)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  make-entry:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute filename and metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          export TZ=Asia/Tbilisi

          Y=$(date +%Y)
          M=$(date +%m)
          MONTH_NAME=$(date +%B)
          TODAY=$(date +%F)

          mkdir -p changelog

          max=0
          shopt -s nullglob
          for f in changelog/${Y}-${M}-week-*.md; do
            n=$(basename "$f" | sed -E 's/.*week-([0-9]{2})\.md/\1/')
            if [[ "$n" =~ ^[0-9]+$ ]] && [ "$n" -gt "$max" ]; then
              max=$n
            fi
          done

          NEXT=$(printf "%02d" $((max + 1)))

          echo "filename=changelog/${Y}-${M}-week-${NEXT}.md" >> "$GITHUB_OUTPUT"
          echo "year=$Y" >> "$GITHUB_OUTPUT"
          echo "month=$M" >> "$GITHUB_OUTPUT"
          echo "month_name=$MONTH_NAME" >> "$GITHUB_OUTPUT"
          echo "week=$NEXT" >> "$GITHUB_OUTPUT"
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"

      - name: Build secure markdown summary
        id: build
        uses: actions/github-script@v7
        env:
          YEAR: ${{ steps.meta.outputs.year }}
          MONTH_NAME: ${{ steps.meta.outputs.month_name }}
          WEEK: ${{ steps.meta.outputs.week }}
          TODAY: ${{ steps.meta.outputs.today }}
        with:
          github-token: ${{ secrets.DEVLOG_TOKEN }}
          script: |
            const targets = [
              {
                owner: 'wine-online-store',
                repo: 'wine-marketplace',
                visibility: 'private',
                includeBranchPatterns: [
                  /^main$/i,
                  /^develop$/i,
                  /^feature\//i,
                  /^bugfix\//i,
                  /^hotfix\//i,
                  /^release\//i
                ],
                excludeBranchPatterns: [
                  /^gh-pages$/i,
                  /^dependabot\//i
                ]
              },
              {
                owner: 'Ba1u1994',
                repo: 'wine-marketplace-roadmap',
                visibility: 'public',
                includeBranchPatterns: [
                  /^main$/i,
                  /^develop$/i,
                  /^feature\//i,
                  /^bugfix\//i,
                  /^hotfix\//i,
                  /^release\//i
                ],
                excludeBranchPatterns: [
                  /^gh-pages$/i,
                  /^dependabot\//i
                ]
              }
            ];

            const since = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();

            const seenShas = new Set();
            const warnings = [];
            const inProgressFlags = [];

            const summary = {
              private: {
                backend: 0,
                domain: 0,
                api: 0,
                adminUi: 0,
                docs: 0,
                ci: 0,
                refactor: 0,
                fixes: 0,
                tests: 0,
                research: 0,
                other: 0
              },
              public: {
                features: [],
                fixes: [],
                docs: [],
                chore: [],
                refactor: [],
                ci: [],
                test: [],
                other: []
              }
            };

            const publicKeywords = {
              features: /^feat(\(.+\))?:/i,
              fixes: /^fix(\(.+\))?:/i,
              docs: /^docs?(\(.+\))?:/i,
              chore: /^chore(\(.+\))?:/i,
              refactor: /^refactor(\(.+\))?:/i,
              ci: /^ci(\(.+\))?:/i,
              test: /^tests?(\(.+\))?:/i
            };

            function matchesAny(name, patterns) {
              return patterns.some((p) => p.test(name));
            }

            function shouldIncludeBranch(branchName, target) {
              if (matchesAny(branchName, target.excludeBranchPatterns || [])) {
                return false;
              }
              if (!target.includeBranchPatterns?.length) {
                return true;
              }
              return matchesAny(branchName, target.includeBranchPatterns);
            }

            function normalizeMessage(msgFull) {
              return (msgFull || '').split('\n')[0].trim();
            }

            function detectPrivateCategory(msg, branch) {
              const text = `${branch} ${msg}`.toLowerCase();

              if (
                text.includes('api') ||
                text.includes('endpoint') ||
                text.includes('controller') ||
                text.includes('contract')
              ) return 'api';

              if (
                text.includes('domain') ||
                text.includes('aggregate') ||
                text.includes('entity') ||
                text.includes('valueobject') ||
                text.includes('value-object') ||
                text.includes('catalog') ||
                text.includes('identity') ||
                text.includes('orders')
              ) return 'domain';

              if (
                text.includes('admin') ||
                text.includes('ui') ||
                text.includes('frontend') ||
                text.includes('react') ||
                text.includes('page') ||
                text.includes('component')
              ) return 'adminUi';

              if (
                text.includes('docs') ||
                text.includes('readme') ||
                text.includes('adr') ||
                text.includes('architecture') ||
                text.includes('roadmap')
              ) return 'docs';

              if (
                text.includes('ci') ||
                text.includes('workflow') ||
                text.includes('pipeline') ||
                text.includes('action') ||
                text.includes('docker')
              ) return 'ci';

              if (
                text.includes('refactor') ||
                text.includes('cleanup') ||
                text.includes('restructure')
              ) return 'refactor';

              if (
                text.startsWith('fix') ||
                text.includes('bug') ||
                text.includes('error') ||
                text.includes('exception') ||
                text.includes('stability')
              ) return 'fixes';

              if (
                text.startsWith('test') ||
                text.includes('spec') ||
                text.includes('coverage')
              ) return 'tests';

              if (
                text.includes('research') ||
                text.includes('investigate') ||
                text.includes('spike') ||
                text.includes('explore')
              ) return 'research';

              if (
                text.startsWith('feat') ||
                text.includes('service') ||
                text.includes('handler') ||
                text.includes('repository') ||
                text.includes('migration') ||
                text.includes('persistence') ||
                text.includes('application')
              ) return 'backend';

              return 'other';
            }

            function addPrivateCommit(msg, branch, sha) {
              if (!sha || seenShas.has(sha)) return;
              seenShas.add(sha);

              const cat = detectPrivateCategory(msg, branch);
              summary.private[cat]++;

              const lower = msg.toLowerCase();
              if (
                lower.includes('wip') ||
                lower.includes('draft') ||
                lower.includes('in progress')
              ) {
                inProgressFlags.push(cat);
              }
            }

            function addPublicCommit(msg, branch, sha, repoLabel) {
              if (!sha || seenShas.has(sha)) return;
              seenShas.add(sha);

              let bucket = 'other';
              for (const [key, regex] of Object.entries(publicKeywords)) {
                if (regex.test(msg)) {
                  bucket = key;
                  break;
                }
              }

              summary.public[bucket].push(`- **${repoLabel}** [\`${branch}\`]: ${msg}`);

              const lower = msg.toLowerCase();
              if (
                lower.includes('wip') ||
                lower.includes('draft') ||
                lower.includes('in progress')
              ) {
                inProgressFlags.push(bucket);
              }
            }

            for (const target of targets) {
              const { owner, repo, visibility } = target;
              const repoLabel = `${owner}/${repo}`;

              try {
                core.info(`Listing branches for ${repoLabel}`);

                const branches = await github.paginate(
                  github.rest.repos.listBranches,
                  { owner, repo, per_page: 100 }
                );

                const includedBranches = branches
                  .map(b => b.name)
                  .filter(name => shouldIncludeBranch(name, target));

                core.info(`Included branches in ${repoLabel}: ${includedBranches.join(', ') || '(none)'}`);

                if (!includedBranches.length) {
                  warnings.push(`- No matching branches found in **${repoLabel}**.`);
                  continue;
                }

                for (const branchName of includedBranches) {
                  try {
                    const commits = await github.paginate(
                      github.rest.repos.listCommits,
                      {
                        owner,
                        repo,
                        sha: branchName,
                        since,
                        per_page: 100
                      }
                    );

                    core.info(`Found ${commits.length} commits in ${repoLabel} [${branchName}]`);

                    for (const c of commits) {
                      const sha = c.sha;
                      const msg = normalizeMessage(c.commit?.message || '');
                      if (!msg) continue;

                      if (visibility === 'private') {
                        addPrivateCommit(msg, branchName, sha);
                      } else {
                        addPublicCommit(msg, branchName, sha, repoLabel);
                      }
                    }
                  } catch (branchError) {
                    const message = branchError?.message || 'Unknown branch read error';
                    core.warning(`Failed to read commits from ${repoLabel} [${branchName}]: ${message}`);
                    warnings.push(`- Could not read commits from **${repoLabel}** branch \`${branchName}\`: ${message}`);
                  }
                }
              } catch (repoError) {
                const message = repoError?.message || 'Unknown repository error';
                core.warning(`Failed to inspect repository ${repoLabel}: ${message}`);
                warnings.push(`- Could not inspect repository **${repoLabel}**: ${message}`);
              }
            }

            function hasPrivateActivity() {
              return Object.values(summary.private).some(v => v > 0);
            }

            function hasPublicActivity() {
              return Object.values(summary.public).some(arr => Array.isArray(arr) && arr.length > 0);
            }

            function buildAccomplished() {
              const lines = [];

              if (hasPrivateActivity()) {
                lines.push('### Private product development');
                if (summary.private.backend > 0) {
                  lines.push('- Advanced backend implementation work across active development branches.');
                }
                if (summary.private.domain > 0) {
                  lines.push('- Continued domain modeling and core service design work.');
                }
                if (summary.private.api > 0) {
                  lines.push('- Refined API and integration-facing implementation details.');
                }
                if (summary.private.adminUi > 0) {
                  lines.push('- Progressed internal/admin user interface work.');
                }
                if (summary.private.refactor > 0) {
                  lines.push('- Improved maintainability through refactoring and internal cleanup.');
                }
                if (summary.private.fixes > 0) {
                  lines.push('- Addressed stability and bug-fix work in ongoing development areas.');
                }
                if (summary.private.tests > 0) {
                  lines.push('- Strengthened validation and quality through test-related work.');
                }
                if (summary.private.ci > 0) {
                  lines.push('- Improved development workflow and automation support.');
                }
                if (summary.private.docs > 0) {
                  lines.push('- Updated internal technical documentation and architecture notes.');
                }
                if (summary.private.research > 0) {
                  lines.push('- Continued research and technical exploration for upcoming implementation decisions.');
                }
                if (summary.private.other > 0) {
                  lines.push('- Made additional implementation progress across active branches.');
                }
                lines.push('');
              }

              if (hasPublicActivity()) {
                lines.push('### Public roadmap and documentation');
                if (summary.public.features.length) {
                  lines.push('#### Features');
                  lines.push(...summary.public.features);
                  lines.push('');
                }
                if (summary.public.fixes.length) {
                  lines.push('#### Fixes');
                  lines.push(...summary.public.fixes);
                  lines.push('');
                }
                if (summary.public.docs.length) {
                  lines.push('#### Docs');
                  lines.push(...summary.public.docs);
                  lines.push('');
                }
                if (summary.public.chore.length) {
                  lines.push('#### Chores / Cleanup');
                  lines.push(...summary.public.chore);
                  lines.push('');
                }
                if (summary.public.refactor.length) {
                  lines.push('#### Refactors');
                  lines.push(...summary.public.refactor);
                  lines.push('');
                }
                if (summary.public.ci.length) {
                  lines.push('#### CI / Automation');
                  lines.push(...summary.public.ci);
                  lines.push('');
                }
                if (summary.public.test.length) {
                  lines.push('#### Tests');
                  lines.push(...summary.public.test);
                  lines.push('');
                }
                if (summary.public.other.length) {
                  lines.push('#### Other Work');
                  lines.push(...summary.public.other);
                  lines.push('');
                }
              }

              if (!lines.length) {
                return '- (no commits found in the last 7 days)';
              }

              return lines.join('\n').trimEnd();
            }

            function buildInProgress() {
              const lines = [];

              if (hasPrivateActivity()) {
                lines.push('- Continued implementation work across active private development branches.');
              }
              if (summary.private.domain > 0 || summary.private.backend > 0 || summary.private.api > 0) {
                lines.push('- Ongoing refinement of backend architecture, domain boundaries, and service behavior.');
              }
              if (summary.private.adminUi > 0) {
                lines.push('- Internal UI/admin-facing improvements remain in progress.');
              }
              if (summary.public.docs.length || summary.public.features.length || summary.public.refactor.length) {
                lines.push('- Public roadmap and delivery documentation continue to evolve with the project.');
              }
              if (!lines.length) {
                lines.push('- (update ongoing work here)');
              }

              return Array.from(new Set(lines)).join('\n');
            }

            function buildLearned() {
              const lines = [];

              if (hasPrivateActivity()) {
                lines.push('- Weekly progress is better represented by active development branches than by release-only branches.');
              }
              if (summary.private.refactor > 0 || summary.private.domain > 0) {
                lines.push('- Ongoing work reinforced the value of keeping architecture and implementation boundaries explicit.');
              }
              if (summary.private.ci > 0 || summary.public.ci.length) {
                lines.push('- Automation and documentation workflows benefit from stricter repository and branch assumptions.');
              }
              if (hasPrivateActivity()) {
                lines.push('- Public-facing devlogs are safer and more useful when private implementation details are summarized at a higher level.');
              }
              if (!lines.length) {
                lines.push('- (reflect on key learnings from this week)');
              }

              return Array.from(new Set(lines)).join('\n');
            }

            const accomplished = buildAccomplished();
            const inProgress = buildInProgress();
            const learned = buildLearned();

            let warningText = '';
            if (warnings.length) {
              warningText = [
                '',
                '## ⚠️ Notes',
                ...warnings
              ].join('\n');
            } else if (hasPrivateActivity()) {
              warningText = [
                '',
                '## ⚠️ Notes',
                '- Private repository activity is intentionally summarized at a high level.'
              ].join('\n');
            }

            const year = process.env.YEAR;
            const monthName = process.env.MONTH_NAME;
            const week = String(parseInt(process.env.WEEK, 10));
            const today = process.env.TODAY;

            const markdown = [
              `# Week ${week} – ${monthName} ${year}`,
              '',
              `_Date created:_ ${today}`,
              '',
              '## ✅ What I accomplished',
              accomplished,
              '',
              '## 🔧 In progress',
              inProgress,
              '',
              '## 🧠 What I learned',
              learned,
              warningText
            ].join('\n');

            core.setOutput('content', markdown);

      - name: Write file
        shell: bash
        run: |
          set -euo pipefail
          file="${{ steps.meta.outputs.filename }}"

          if [ -f "$file" ]; then
            echo "File already exists: $file"
            exit 0
          fi

          cat > "$file" <<'EOF'
          ${{ steps.build.outputs.content }}
          EOF

          echo "Created $file"

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "ba1u-bot"
          git config user.email "actions@users.noreply.github.com"

          git add "${{ steps.meta.outputs.filename }}"

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore(devlog): create ${{ steps.meta.outputs.filename }}"
          git push
