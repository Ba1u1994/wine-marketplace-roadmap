name: weekly devlog stub

on:
  schedule:
    - cron: "0 7 * * MON" # Every Monday 07:00 UTC (11:00 Tbilisi)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  make-entry:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute filename and metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          export TZ=Asia/Tbilisi

          Y=$(date +%Y)
          M=$(date +%m)
          MONTH_NAME=$(date +%B)
          TODAY=$(date +%F)

          mkdir -p changelog

          max=0
          shopt -s nullglob
          for f in changelog/${Y}-${M}-week-*.md; do
            n=$(basename "$f" | sed -E 's/.*week-([0-9]{2})\.md/\1/')
            if [[ "$n" =~ ^[0-9]+$ ]] && [ "$n" -gt "$max" ]; then
              max=$n
            fi
          done

          NEXT=$(printf "%02d" $((max + 1)))

          echo "filename=changelog/${Y}-${M}-week-${NEXT}.md" >> "$GITHUB_OUTPUT"
          echo "year=$Y" >> "$GITHUB_OUTPUT"
          echo "month=$M" >> "$GITHUB_OUTPUT"
          echo "month_name=$MONTH_NAME" >> "$GITHUB_OUTPUT"
          echo "week=$NEXT" >> "$GITHUB_OUTPUT"
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"

      - name: Build markdown content from commits
        id: build
        uses: actions/github-script@v7
        env:
          YEAR: ${{ steps.meta.outputs.year }}
          MONTH: ${{ steps.meta.outputs.month }}
          MONTH_NAME: ${{ steps.meta.outputs.month_name }}
          WEEK: ${{ steps.meta.outputs.week }}
          TODAY: ${{ steps.meta.outputs.today }}
        with:
          github-token: ${{ secrets.DEVLOG_TOKEN }}
          script: |
            const targets = [
              {
                owner: 'wine-online-store',
                repo: 'wine-marketplace',
                includeBranchPatterns: [
                  /^main$/i,
                  /^develop$/i,
                  /^feature\//i,
                  /^bugfix\//i,
                  /^hotfix\//i,
                  /^release\//i
                ],
                excludeBranchPatterns: [
                  /^gh-pages$/i,
                  /^dependabot\//i
                ]
              },
              {
                owner: 'Ba1u1994',
                repo: 'wine-marketplace-roadmap',
                includeBranchPatterns: [
                  /^main$/i,
                  /^develop$/i,
                  /^feature\//i,
                  /^bugfix\//i,
                  /^hotfix\//i,
                  /^release\//i
                ],
                excludeBranchPatterns: [
                  /^gh-pages$/i,
                  /^dependabot\//i
                ]
              }
            ];

            const since = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();

            const buckets = {
              feat: [],
              fix: [],
              docs: [],
              chore: [],
              refactor: [],
              ci: [],
              test: [],
              other: []
            };

            const inProgress = [];
            const warnings = [];
            const seenShas = new Set();

            const keywords = {
              feat: /^feat(\(.+\))?:/i,
              fix: /^fix(\(.+\))?:/i,
              docs: /^docs?(\(.+\))?:/i,
              chore: /^chore(\(.+\))?:/i,
              refactor: /^refactor(\(.+\))?:/i,
              ci: /^ci(\(.+\))?:/i,
              test: /^tests?(\(.+\))?:/i
            };

            function matchesAny(name, patterns) {
              return patterns.some((p) => p.test(name));
            }

            function shouldIncludeBranch(branchName, target) {
              if (matchesAny(branchName, target.excludeBranchPatterns || [])) {
                return false;
              }

              if (!target.includeBranchPatterns || target.includeBranchPatterns.length === 0) {
                return true;
              }

              return matchesAny(branchName, target.includeBranchPatterns);
            }

            function categorizeMessage(msg) {
              for (const [key, regex] of Object.entries(keywords)) {
                if (regex.test(msg)) {
                  return key;
                }
              }
              return 'other';
            }

            function addCommit(repoLabel, branchName, msgFull, sha) {
              const msg = (msgFull || '').split('\n')[0].trim();
              if (!msg || !sha) return;
              if (seenShas.has(sha)) return;

              seenShas.add(sha);

              const line = `- **${repoLabel}** [\`${branchName}\`]: ${msg}`;
              const cat = categorizeMessage(msg);
              buckets[cat].push(line);

              const lower = msgFull.toLowerCase();
              if (
                lower.includes('wip') ||
                lower.includes('in progress') ||
                lower.includes('draft')
              ) {
                inProgress.push(line);
              }
            }

            for (const target of targets) {
              const { owner, repo } = target;
              const repoLabel = `${owner}/${repo}`;

              try {
                core.info(`Listing branches for ${repoLabel}`);

                const branches = await github.paginate(
                  github.rest.repos.listBranches,
                  { owner, repo, per_page: 100 }
                );

                const includedBranches = branches
                  .map(b => b.name)
                  .filter(name => shouldIncludeBranch(name, target));

                core.info(`Included branches in ${repoLabel}: ${includedBranches.join(', ') || '(none)'}`);

                if (includedBranches.length === 0) {
                  warnings.push(`- No matching branches found in **${repoLabel}**.`);
                  continue;
                }

                for (const branchName of includedBranches) {
                  try {
                    core.info(`Reading commits from ${repoLabel} branch ${branchName} since ${since}`);

                    const commits = await github.paginate(
                      github.rest.repos.listCommits,
                      {
                        owner,
                        repo,
                        sha: branchName,
                        since,
                        per_page: 100
                      }
                    );

                    core.info(`Found ${commits.length} commits in ${repoLabel} [${branchName}]`);

                    for (const c of commits) {
                      const sha = c.sha;
                      const msgFull = c.commit?.message || '';
                      addCommit(repoLabel, branchName, msgFull, sha);
                    }
                  } catch (branchError) {
                    const message = branchError?.message || 'Unknown branch read error';
                    core.warning(`Failed to read commits from ${repoLabel} [${branchName}]: ${message}`);
                    warnings.push(`- Could not read commits from **${repoLabel}** branch \`${branchName}\`: ${message}`);
                  }
                }
              } catch (repoError) {
                const message = repoError?.message || 'Unknown repository error';
                core.warning(`Failed to inspect repository ${repoLabel}: ${message}`);
                warnings.push(`- Could not inspect repository **${repoLabel}**: ${message}`);
              }
            }

            const nonEmpty = (arr) => Array.isArray(arr) && arr.length > 0;

            let accomplished = '';
            const sections = [
              ['feat', '### Features'],
              ['fix', '### Fixes'],
              ['docs', '### Docs'],
              ['chore', '### Chores / Cleanup'],
              ['refactor', '### Refactors'],
              ['ci', '### CI / Automation'],
              ['test', '### Tests'],
              ['other', '### Other Work']
            ];

            for (const [key, title] of sections) {
              const items = buckets[key];
              if (nonEmpty(items)) {
                accomplished += `${title}\n`;
                accomplished += items.join('\n') + '\n\n';
              }
            }

            if (!accomplished.trim()) {
              accomplished = '- (no commits found in the last 7 days)\n';
            }

            let inProgText = '';
            if (nonEmpty(inProgress)) {
              inProgText = inProgress.join('\n');
            } else {
              inProgText = '- (update ongoing work here)';
            }

            const learned = [];
            if (nonEmpty(buckets.feat)) {
              learned.push('- Built or extended new features.');
            }
            if (nonEmpty(buckets.fix)) {
              learned.push('- Improved stability by fixing bugs.');
            }
            if (nonEmpty(buckets.docs) || nonEmpty(buckets.chore)) {
              learned.push('- Invested time in documentation and cleanup.');
            }
            if (nonEmpty(buckets.ci)) {
              learned.push('- Improved CI/CD and automation understanding.');
            }
            if (nonEmpty(buckets.refactor)) {
              learned.push('- Practiced refactoring and design improvement.');
            }
            if (nonEmpty(buckets.test)) {
              learned.push('- Added or improved validation through tests.');
            }
            if (!learned.length) {
              learned.push('- (reflect on key learnings from this week)');
            }

            let warningText = '';
            if (nonEmpty(warnings)) {
              warningText = [
                '',
                '## ⚠️ Notes',
                ...warnings
              ].join('\n');
            }

            const year = process.env.YEAR;
            const monthName = process.env.MONTH_NAME;
            const week = String(parseInt(process.env.WEEK, 10));
            const today = process.env.TODAY;

            const markdown = [
              `# Week ${week} – ${monthName} ${year}`,
              '',
              `_Date created:_ ${today}`,
              '',
              '## ✅ What I accomplished',
              accomplished.trimEnd(),
              '',
              '## 🔧 In progress',
              inProgText,
              '',
              '## 🧠 What I learned',
              learned.join('\n'),
              warningText
            ].join('\n');

            core.setOutput('content', markdown);

      - name: Write file
        shell: bash
        run: |
          set -euo pipefail
          file="${{ steps.meta.outputs.filename }}"

          if [ -f "$file" ]; then
            echo "File already exists: $file"
            exit 0
          fi

          cat > "$file" <<'EOF'
          ${{ steps.build.outputs.content }}
          EOF

          echo "Created $file"

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "ba1u-bot"
          git config user.email "actions@users.noreply.github.com"

          git add "${{ steps.meta.outputs.filename }}"

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore(devlog): create ${{ steps.meta.outputs.filename }}"
          git push
