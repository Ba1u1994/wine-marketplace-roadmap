name: Weekly DevLog (V3.2)

on:
  schedule:
    - cron: "0 7 * * MON"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-weekly-devlog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout roadmap repo
        uses: actions/checkout@v4

      - name: Ensure changelog directory exists
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p changelog

      - name: Build weekly devlogs from private repo activity
        id: build
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DEVLOG_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const owner = 'wine-online-store';
            const repo = 'wine-marketplace';
            const changelogDir = 'changelog';

            const includeBranchPatterns = [
              /^main$/i,
              /^develop$/i,
              /^feature\//i,
              /^bugfix\//i,
              /^hotfix\//i,
              /^release\//i,
              /^claude\//i
            ];

            const excludeBranchPatterns = [
              /^gh-pages$/i,
              /^dependabot\//i
            ];

            function matchesAny(name, patterns) {
              return patterns.some((p) => p.test(name));
            }

            function shouldIncludeBranch(branchName) {
              if (matchesAny(branchName, excludeBranchPatterns)) return false;
              return matchesAny(branchName, includeBranchPatterns);
            }

            function normalizeMessage(msgFull) {
              return String(msgFull || '').split('\n')[0].trim();
            }

            function startOfWeekUTC(dateObj) {
              const d = new Date(Date.UTC(
                dateObj.getUTCFullYear(),
                dateObj.getUTCMonth(),
                dateObj.getUTCDate()
              ));
              const day = d.getUTCDay(); // 0=Sun, 1=Mon
              const diff = day === 0 ? -6 : 1 - day;
              d.setUTCDate(d.getUTCDate() + diff);
              d.setUTCHours(0, 0, 0, 0);
              return d;
            }

            function addDaysUTC(dateObj, days) {
              const d = new Date(dateObj.getTime());
              d.setUTCDate(d.getUTCDate() + days);
              return d;
            }

            function formatDateUTC(dateObj) {
              return dateObj.toISOString().slice(0, 10);
            }

            function monthNameUTC(dateObj) {
              return dateObj.toLocaleString('en-US', {
                month: 'long',
                timeZone: 'UTC'
              });
            }

            function getMonthWeekNumber(weekStart) {
              const year = weekStart.getUTCFullYear();
              const month = weekStart.getUTCMonth();

              let cursor = new Date(Date.UTC(year, month, 1));
              cursor = startOfWeekUTC(cursor);

              let week = 1;
              while (cursor.getTime() < weekStart.getTime()) {
                cursor = addDaysUTC(cursor, 7);
                week++;
              }

              return week;
            }

            function weekStartFromYearMonthWeek(year, monthOneBased, weekNumber) {
              let cursor = new Date(Date.UTC(year, monthOneBased - 1, 1));
              cursor = startOfWeekUTC(cursor);
              cursor = addDaysUTC(cursor, (weekNumber - 1) * 7);
              return cursor;
            }

            function filenameFromWeekStart(weekStart) {
              const year = weekStart.getUTCFullYear();
              const month = String(weekStart.getUTCMonth() + 1).padStart(2, '0');
              const weekNumber = String(getMonthWeekNumber(weekStart)).padStart(2, '0');
              return `${year}-${month}-week-${weekNumber}.md`;
            }

            function unique(arr) {
              return Array.from(new Set(arr));
            }

            function incrementMap(map, key, amount = 1) {
              map.set(key, (map.get(key) || 0) + amount);
            }

            function sortEntriesDesc(map) {
              return Array.from(map.entries()).sort((a, b) => {
                if (b[1] !== a[1]) return b[1] - a[1];
                return a[0].localeCompare(b[0]);
              });
            }

            function makeWeekState() {
              return {
                commits: [],
                areaActionCounts: new Map(),
                areaCounts: new Map(),
                subAreaCounts: new Map(),
                techniqueCounts: new Map(),
                learningSignals: new Map()
              };
            }

            function detectArea(msg) {
              const m = msg.toLowerCase();

              if (/(identity|auth|jwt|token|session|user|role|permission|rbac)/i.test(m)) return 'Identity Service';
              if (/(catalog|wine|winery|region|grape|appellation|vintage)/i.test(m)) return 'Catalog Service';
              if (/(order|cart|checkout|basket)/i.test(m)) return 'Orders Service';
              if (/(pricing|price|money|priceversion|productpricing)/i.test(m)) return 'Pricing Service';
              if (/(payment|transaction|provider|billing|refund|invoice)/i.test(m)) return 'Payments Service';
              if (/(delivery|shipment|shipping|tracking|carrier|fulfillment)/i.test(m)) return 'Delivery Service';
              if (/(react|frontend|vite|typescript|page|component|layout|hook|form|ui)/i.test(m)) return 'Web Frontend';
              if (/(admin|dashboard|backoffice|management panel)/i.test(m)) return 'Admin Frontend';
              if (/(gateway|ocelot|proxy|routing|bff)/i.test(m)) return 'API Gateway';
              if (/(value object|valueobject|aggregate root|strongly typed id|shared|kernel|result pattern|base entity)/i.test(m)) return 'Shared Building Blocks';
              if (/(docker|compose|workflow|pipeline|github actions|ci|cd|environment|deployment|infra|logging|observability|monitoring)/i.test(m)) return 'Infrastructure / DevOps';
              if (/(docs|readme|adr|architecture|roadmap|design|decision|planning|execution plan|security\.md|testing\.md|development\.md|api\.md)/i.test(m)) return 'Architecture / Documentation';

              if (/(api|endpoint|contract|request|response|swagger)/i.test(m)) return 'API Surface';
              if (/(repository|migration|dbcontext|database|sql|persistence|query)/i.test(m)) return 'Persistence Layer';

              return 'Core backend services';
            }

            function detectSubArea(msg) {
              const m = msg.toLowerCase();

              if (/(refresh token|token rotation|token family|session)/i.test(m)) return 'token and session management';
              if (/(role|permission|rbac|authorization|access control)/i.test(m)) return 'authorization and access control';
              if (/(wine image|image sort|sort order|media|image)/i.test(m)) return 'media and image handling';
              if (/(repository|migration|dbcontext|database|sql|persistence|query)/i.test(m)) return 'persistence and data access';
              if (/(api|endpoint|contract|swagger|request|response)/i.test(m)) return 'API contracts';
              if (/(docker|compose|environment|configuration|settings)/i.test(m)) return 'environment setup';
              if (/(test|validation|validator|coverage|spec)/i.test(m)) return 'testing and validation';
              if (/(aggregate|entity|value object|valueobject|domain model|domain modeling|invariant)/i.test(m)) return 'domain modeling';
              if (/(handler|use case|application flow|command|query|mediatr|cqrs)/i.test(m)) return 'application flow';
              if (/(roadmap|adr|architecture|design note|boundary|layer|execution plan)/i.test(m)) return 'architecture and design direction';
              if (/(security|headers|rate limit|authorize|policy)/i.test(m)) return 'security boundaries';
              if (/(money|price history|timeline|effectivefrom|effectiveto)/i.test(m)) return 'pricing timeline behavior';

              if (/(wine|winery|region|grape|appellation)/i.test(m)) return 'catalog structure';
              if (/(auth|identity|token|session|login|logout|register)/i.test(m)) return 'authentication flow';

              return 'core functionality';
            }

            function detectAction(msg) {
              const m = msg.toLowerCase();

              if (/^feat(\(.+\))?:/i.test(msg)) return 'implemented';
              if (/^fix(\(.+\))?:/i.test(msg)) return 'fixed';
              if (/^refactor(\(.+\))?:/i.test(msg)) return 'refactored';
              if (/^docs?(\(.+\))?:/i.test(msg)) return 'documented';
              if (/^tests?(\(.+\))?:/i.test(msg)) return 'tested';
              if (/^ci(\(.+\))?:/i.test(msg)) return 'automated';
              if (/^chore(\(.+\))?:/i.test(msg)) return 'improved';

              if (/(security|auth|jwt|token|authorization|permission|role)/i.test(m)) return 'strengthened';
              if (/(repository|migration|dbcontext|database|sql|persistence)/i.test(m)) return 'improved';
              if (/(api|endpoint|contract|request|response|swagger)/i.test(m)) return 'refined';
              if (/(aggregate|entity|domain model|domain modeling|value object|valueobject)/i.test(m)) return 'modeled';

              return 'advanced';
            }

            function detectTechniques(msg) {
              const m = msg.toLowerCase();
              const tech = [];

              if (/clean architecture/i.test(m)) tech.push('Clean Architecture');
              if (/\bddd\b/i.test(m)) tech.push('DDD');
              if (/\bcqrs\b/i.test(m)) tech.push('CQRS');
              if (/mediatr/i.test(m)) tech.push('MediatR');
              if (/ef core|dbcontext|migration/i.test(m)) tech.push('EF Core');
              if (/\bjwt\b/i.test(m)) tech.push('JWT');
              if (/refresh token/i.test(m)) tech.push('refresh token strategies');
              if (/repository/i.test(m)) tech.push('repository pattern');
              if (/docker|compose/i.test(m)) tech.push('Docker');
              if (/github actions|workflow/i.test(m)) tech.push('GitHub Actions');
              if (/react/i.test(m)) tech.push('React');
              if (/typescript/i.test(m)) tech.push('TypeScript');
              if (/validation|validator|fluentvalidation/i.test(m)) tech.push('validation');
              if (/logging|observability|monitoring/i.test(m)) tech.push('logging and observability');
              if (/problem details|problemdetails|exception|error handling/i.test(m)) tech.push('error handling');
              if (/value object|valueobject/i.test(m)) tech.push('value objects');
              if (/strongly typed id/i.test(m)) tech.push('strongly typed IDs');
              if (/aggregate root/i.test(m)) tech.push('aggregate roots');
              if (/result pattern|\bresult\b/i.test(m)) tech.push('result pattern');
              if (/security header|rate limit|rate-limited|authorize|policy/i.test(m)) tech.push('security hardening');

              return tech;
            }

            function detectLearningSignals(area, subArea, action, msg) {
              const m = msg.toLowerCase();
              const signals = [];

              if ((area === 'Identity Service' || area === 'Pricing Service') && /persistence|repository|dbcontext|database|sql/.test(m)) {
                signals.push('State that changes over time is easier to maintain when persistence concerns stay outside core domain behavior.');
              }

              if (area === 'Catalog Service' && /api|endpoint|contract|request|response/.test(m)) {
                signals.push('Catalog contracts become clearer once the underlying business concepts are modeled more explicitly.');
              }

              if (area === 'Shared Building Blocks') {
                signals.push('Shared primitives are most useful when they stay minimal and avoid carrying service-specific behavior.');
              }

              if (area === 'Infrastructure / DevOps') {
                signals.push('Reliable delivery depends heavily on repeatable local setup and stable workflow assumptions.');
              }

              if (/(test|validation|validator|coverage|spec)/i.test(m)) {
                signals.push('Validation and testing pay off most when contracts are tightened before behavior spreads further.');
              }

              if (/(boundary|layer|architecture|clean architecture|ddd|cqrs)/i.test(m)) {
                signals.push('Explicit domain, application, and infrastructure boundaries reduce architectural drift over time.');
              }

              if (/(security|authorize|policy|rate limit|header)/i.test(m)) {
                signals.push('Security behavior becomes easier to reason about when access rules are enforced consistently at the boundary.');
              }

              if (signals.length === 0) {
                if (area === 'Catalog Service') {
                  signals.push('Catalog work benefits from keeping domain language clear before expanding persistence and API surface.');
                } else if (area === 'Identity Service') {
                  signals.push('Identity-related work stays healthier when security concerns remain explicit and localized.');
                } else if (area === 'Pricing Service') {
                  signals.push('Pricing behavior becomes safer when timeline rules are enforced in the model before infrastructure is added around it.');
                } else if (action === 'refactored') {
                  signals.push('Structural cleanup is most effective before complexity becomes harder to unwind.');
                }
              }

              return signals;
            }

            function summarizeCommit(msg) {
              const area = detectArea(msg);
              const subArea = detectSubArea(msg);
              const action = detectAction(msg);
              const techniques = detectTechniques(msg);
              const learningSignals = detectLearningSignals(area, subArea, action, msg);

              return {
                area,
                subArea,
                action,
                techniques,
                learningSignals
              };
            }

            function addCommitToWeek(state, analyzed) {
              state.commits.push(analyzed);

              incrementMap(state.areaCounts, analyzed.area);
              incrementMap(state.subAreaCounts, analyzed.subArea);
              incrementMap(state.areaActionCounts, analyzed.area + '__' + analyzed.subArea + '__' + analyzed.action);

              for (const tech of analyzed.techniques) {
                incrementMap(state.techniqueCounts, tech);
              }

              for (const signal of analyzed.learningSignals) {
                incrementMap(state.learningSignals, signal);
              }
            }

            function buildKeyFocus(state) {
              return sortEntriesDesc(state.areaCounts)
                .slice(0, 3)
                .map(([name]) => name);
            }

            function buildAccomplished(state) {
              const lines = [];

              const dominant = sortEntriesDesc(state.areaActionCounts)
                .slice(0, 5)
                .map(([key]) => {
                  const parts = key.split('__');
                  return {
                    area: parts[0],
                    subArea: parts[1],
                    action: parts[2]
                  };
                });

              const grouped = new Map();

              for (const item of dominant) {
                if (!grouped.has(item.area)) {
                  grouped.set(item.area, []);
                }
                grouped.get(item.area).push(item);
              }

              for (const [area, items] of grouped.entries()) {
                const subAreas = unique(items.map(i => i.subArea)).slice(0, 2);
                const actions = unique(items.map(i => i.action));

                if (actions.includes('implemented') && actions.includes('refined')) {
                  lines.push('Implemented and refined ' + area + ' around ' + subAreas.join(' and ') + '.');
                } else if (actions.includes('implemented') && actions.includes('improved')) {
                  lines.push('Implemented and improved ' + area + ' around ' + subAreas.join(' and ') + '.');
                } else if (actions.includes('implemented') && actions.includes('tested')) {
                  lines.push('Implemented and tested ' + area + ' around ' + subAreas.join(' and ') + '.');
                } else if (actions.includes('strengthened')) {
                  lines.push('Strengthened ' + area + ' with emphasis on ' + subAreas.join(' and ') + '.');
                } else if (actions.includes('refactored')) {
                  lines.push('Refactored ' + area + ' around ' + subAreas.join(' and ') + ' to improve maintainability.');
                } else if (actions.includes('documented')) {
                  lines.push('Documented architectural or implementation decisions in ' + area + ' around ' + subAreas.join(' and ') + '.');
                } else if (actions.includes('tested')) {
                  lines.push('Expanded testing work in ' + area + ' around ' + subAreas.join(' and ') + '.');
                } else if (actions.includes('automated')) {
                  lines.push('Improved automation and workflow support in ' + area + ' related to ' + subAreas.join(' and ') + '.');
                } else if (actions.includes('modeled')) {
                  lines.push('Advanced modeling work in ' + area + ' around ' + subAreas.join(' and ') + '.');
                } else if (actions.includes('fixed')) {
                  lines.push('Fixed issues in ' + area + ' related to ' + subAreas.join(' and ') + '.');
                } else if (actions.includes('refined')) {
                  lines.push('Refined ' + area + ' with focus on ' + subAreas.join(' and ') + '.');
                } else if (actions.includes('improved')) {
                  lines.push('Improved ' + area + ' around ' + subAreas.join(' and ') + '.');
                } else {
                  lines.push('Advanced ' + area + ' with focus on ' + subAreas.join(' and ') + '.');
                }
              }

              const techniques = sortEntriesDesc(state.techniqueCounts)
                .slice(0, 4)
                .map(([name]) => name);

              if (techniques.length > 0) {
                lines.push('This week also involved work with ' + techniques.join(', ') + '.');
              }

              return unique(lines).slice(0, 5);
            }

            function buildLearned(state) {
              const lessons = sortEntriesDesc(state.learningSignals)
                .slice(0, 3)
                .map(([text]) => text);

              if (lessons.length > 0) {
                return lessons;
              }

              return [
                'This week reinforced the importance of aligning implementation decisions with long-term architectural goals.'
              ];
            }

            function inferNextProgress(currentKey, orderedKeys, weeksMap) {
              const idx = orderedKeys.indexOf(currentKey);
              if (idx === -1 || idx === orderedKeys.length - 1) {
                return [];
              }

              const nextState = weeksMap.get(orderedKeys[idx + 1]);
              if (!nextState || !nextState.commits.length) {
                return [];
              }

              const grouped = new Map();

              const dominant = sortEntriesDesc(nextState.areaActionCounts)
                .slice(0, 4)
                .map(([key]) => {
                  const parts = key.split('__');
                  return {
                    area: parts[0],
                    subArea: parts[1]
                  };
                });

              for (const item of dominant) {
                if (!grouped.has(item.area)) {
                  grouped.set(item.area, []);
                }
                grouped.get(item.area).push(item.subArea);
              }

              const lines = [];

              for (const [area, subAreas] of Array.from(grouped.entries()).slice(0, 2)) {
                const uniqueSubAreas = unique(subAreas).slice(0, 2);

                if (uniqueSubAreas.length === 1) {
                  lines.push('Work is expected to continue in ' + area + ', especially around ' + uniqueSubAreas[0] + '.');
                } else {
                  lines.push('Work is expected to continue in ' + area + ', especially around ' + uniqueSubAreas.join(' and ') + '.');
                }
              }

              return lines;
            }

            function parseExistingWeekFile(filename) {
              const match = /^(\d{4})-(\d{2})-week-(\d{2})\.md$/.exec(filename);
              if (!match) return null;

              const year = parseInt(match[1], 10);
              const month = parseInt(match[2], 10);
              const week = parseInt(match[3], 10);
              const weekStart = weekStartFromYearMonthWeek(year, month, week);

              return {
                filename,
                year,
                month,
                week,
                weekStart
              };
            }

            const repoResponse = await github.rest.repos.get({ owner, repo });
            const repoCreatedAt = new Date(repoResponse.data.created_at);

            const existingFiles = fs.existsSync(changelogDir)
              ? fs.readdirSync(changelogDir).filter(name => /^(\d{4})-(\d{2})-week-(\d{2})\.md$/.test(name))
              : [];

            const parsedExisting = existingFiles
              .map(parseExistingWeekFile)
              .filter(Boolean)
              .sort((a, b) => a.weekStart.getTime() - b.weekStart.getTime());

            let sinceDate;
            if (parsedExisting.length > 0) {
              const latest = parsedExisting[parsedExisting.length - 1];
              sinceDate = latest.weekStart;
              core.info('Latest existing changelog: ' + latest.filename + ' (week start ' + formatDateUTC(latest.weekStart) + ')');
            } else {
              sinceDate = startOfWeekUTC(repoCreatedAt);
              core.info('No existing changelog files found. Starting from repository creation week: ' + formatDateUTC(sinceDate));
            }

            const since = sinceDate.toISOString();
            const now = new Date();

            const branches = await github.paginate(
              github.rest.repos.listBranches,
              {
                owner,
                repo,
                per_page: 100
              }
            );

            const includedBranches = branches
              .map(b => b.name)
              .filter(name => shouldIncludeBranch(name));

            core.info('Included branches: ' + (includedBranches.join(', ') || '(none)'));

            if (!includedBranches.length) {
              throw new Error('No matching branches found to process.');
            }

            const weeks = new Map();
            const seenShas = new Set();

            for (const branchName of includedBranches) {
              try {
                core.info('Reading commits from branch ' + branchName + ' since ' + since);

                const commits = await github.paginate(
                  github.rest.repos.listCommits,
                  {
                    owner,
                    repo,
                    sha: branchName,
                    since,
                    per_page: 100
                  }
                );

                core.info('Found ' + commits.length + ' commits in branch ' + branchName);

                for (const commit of commits) {
                  const sha = commit.sha;
                  if (!sha || seenShas.has(sha)) continue;

                  seenShas.add(sha);

                  const msg = normalizeMessage(commit.commit && commit.commit.message);
                  const commitDateRaw =
                    (commit.commit && commit.commit.author && commit.commit.author.date) ||
                    (commit.commit && commit.commit.committer && commit.commit.committer.date);

                  if (!msg || !commitDateRaw) continue;

                  const commitDate = new Date(commitDateRaw);
                  const weekStart = startOfWeekUTC(commitDate);
                  const weekKey = formatDateUTC(weekStart);

                  if (!weeks.has(weekKey)) {
                    weeks.set(weekKey, makeWeekState());
                  }

                  const analyzed = summarizeCommit(msg);
                  addCommitToWeek(weeks.get(weekKey), analyzed);
                }
              } catch (error) {
                core.warning('Failed to read branch ' + branchName + ': ' + (error && error.message ? error.message : 'Unknown error'));
              }
            }

            const weekKeysWithActivity = Array.from(weeks.keys()).sort();

            const filesCreated = [];

            for (const weekKey of weekKeysWithActivity) {
              const weekStart = new Date(weekKey + 'T00:00:00Z');
              const filename = filenameFromWeekStart(weekStart);
              const filePath = path.join(changelogDir, filename);

              if (fs.existsSync(filePath)) {
                core.info('Skipping existing file: ' + filePath);
                continue;
              }

              const state = weeks.get(weekKey);
              if (!state || !state.commits.length) {
                continue;
              }

              const year = weekStart.getUTCFullYear();
              const weekNumber = String(getMonthWeekNumber(weekStart)).padStart(2, '0');
              const monthName = monthNameUTC(weekStart);

              const keyFocus = buildKeyFocus(state);
              const accomplished = buildAccomplished(state);
              const learned = buildLearned(state);
              const progress = inferNextProgress(weekKey, weekKeysWithActivity, weeks);

              const keyFocusText = keyFocus.map(line => '- ' + line).join('\n');
              const accomplishedText = accomplished.map(line => '- ' + line).join('\n');
              const progressText = progress.length
                ? progress.map(line => '- ' + line).join('\n')
                : '- No clear follow-up activity was inferred yet.';
              const learnedText = learned.map(line => '- ' + line).join('\n');

              const content =
                '# Week ' + parseInt(weekNumber, 10) + ' – ' + monthName + ' ' + year + '\n\n' +
                '_Date created:_ ' + formatDateUTC(now) + '\n\n' +
                '## 🧩 Key focus\n' +
                keyFocusText + '\n\n' +
                '## ✅ What I accomplished\n' +
                accomplishedText + '\n\n' +
                '## 🔧 In progress\n' +
                progressText + '\n\n' +
                '## 🧠 What I learned\n' +
                learnedText + '\n';

              fs.writeFileSync(filePath, content, 'utf8');
              filesCreated.push(filePath);
              core.info('Wrote ' + filePath);
            }

            core.setOutput('has_activity', filesCreated.length > 0 ? 'true' : 'false');
            core.setOutput('files_created', JSON.stringify(filesCreated));
            core.setOutput('file_count', String(filesCreated.length));
            core.setOutput('branch_count', String(includedBranches.length));
            core.setOutput('commit_count', String(seenShas.size));

      - name: Commit generated changelogs
        if: steps.build.outputs.has_activity == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add changelog/

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore(devlog): create missing weekly changelogs"
          git push

      - name: Print summary
        shell: bash
        run: |
          echo "Has activity: ${{ steps.build.outputs.has_activity }}"
          echo "Files created: ${{ steps.build.outputs.files_created }}"
          echo "File count: ${{ steps.build.outputs.file_count }}"
          echo "Branches scanned: ${{ steps.build.outputs.branch_count }}"
          echo "Unique commits scanned: ${{ steps.build.outputs.commit_count }}"
