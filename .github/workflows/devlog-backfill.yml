name: devlog backfill from private repo

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure changelog directory exists
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p changelog

      - name: Generate changelog files from project start
        id: build
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DEVLOG_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const target = {
              owner: 'wine-online-store',
              repo: 'wine-marketplace',
              includeBranchPatterns: [
                /^main$/i,
                /^develop$/i,
                /^feature\//i,
                /^bugfix\//i,
                /^hotfix\//i,
                /^release\//i
              ],
              excludeBranchPatterns: [
                /^gh-pages$/i,
                /^dependabot\//i
              ]
            };

            function matchesAny(name, patterns) {
              return patterns.some((p) => p.test(name));
            }

            function shouldIncludeBranch(branchName) {
              if (matchesAny(branchName, target.excludeBranchPatterns || [])) {
                return false;
              }
              if (!target.includeBranchPatterns?.length) {
                return true;
              }
              return matchesAny(branchName, target.includeBranchPatterns);
            }

            function normalizeMessage(msgFull) {
              return (msgFull || '').split('\n')[0].trim();
            }

            function detectPrivateCategory(msg, branch) {
              const text = `${branch} ${msg}`.toLowerCase();

              if (
                text.includes('api') ||
                text.includes('endpoint') ||
                text.includes('controller') ||
                text.includes('contract')
              ) return 'api';

              if (
                text.includes('domain') ||
                text.includes('aggregate') ||
                text.includes('entity') ||
                text.includes('valueobject') ||
                text.includes('value-object') ||
                text.includes('catalog') ||
                text.includes('identity') ||
                text.includes('orders')
              ) return 'domain';

              if (
                text.includes('admin') ||
                text.includes('ui') ||
                text.includes('frontend') ||
                text.includes('react') ||
                text.includes('page') ||
                text.includes('component')
              ) return 'adminUi';

              if (
                text.includes('docs') ||
                text.includes('readme') ||
                text.includes('adr') ||
                text.includes('architecture') ||
                text.includes('roadmap')
              ) return 'docs';

              if (
                text.includes('ci') ||
                text.includes('workflow') ||
                text.includes('pipeline') ||
                text.includes('action') ||
                text.includes('docker')
              ) return 'ci';

              if (
                text.includes('refactor') ||
                text.includes('cleanup') ||
                text.includes('restructure')
              ) return 'refactor';

              if (
                text.startsWith('fix') ||
                text.includes('bug') ||
                text.includes('error') ||
                text.includes('exception') ||
                text.includes('stability')
              ) return 'fixes';

              if (
                text.startsWith('test') ||
                text.includes('spec') ||
                text.includes('coverage')
              ) return 'tests';

              if (
                text.includes('research') ||
                text.includes('investigate') ||
                text.includes('spike') ||
                text.includes('explore')
              ) return 'research';

              if (
                text.startsWith('feat') ||
                text.includes('service') ||
                text.includes('handler') ||
                text.includes('repository') ||
                text.includes('migration') ||
                text.includes('persistence') ||
                text.includes('application')
              ) return 'backend';

              return 'other';
            }

            function startOfWeekUTC(dateObj) {
              const d = new Date(Date.UTC(
                dateObj.getUTCFullYear(),
                dateObj.getUTCMonth(),
                dateObj.getUTCDate()
              ));
              const day = d.getUTCDay(); // 0=Sun, 1=Mon
              const diff = day === 0 ? -6 : 1 - day;
              d.setUTCDate(d.getUTCDate() + diff);
              d.setUTCHours(0, 0, 0, 0);
              return d;
            }

            function addDaysUTC(dateObj, days) {
              const d = new Date(dateObj.getTime());
              d.setUTCDate(d.getUTCDate() + days);
              return d;
            }

            function formatDateUTC(dateObj) {
              return dateObj.toISOString().slice(0, 10);
            }

            function monthNameUTC(dateObj) {
              return dateObj.toLocaleString('en-US', {
                month: 'long',
                timeZone: 'UTC'
              });
            }

            function getMonthWeekNumber(weekStart) {
              const year = weekStart.getUTCFullYear();
              const month = weekStart.getUTCMonth();

              let cursor = new Date(Date.UTC(year, month, 1));
              cursor = startOfWeekUTC(cursor);

              let week = 1;
              while (cursor.getTime() < weekStart.getTime()) {
                cursor = addDaysUTC(cursor, 7);
                week++;
              }

              return week;
            }

            function makeWeekState() {
              return {
                backend: 0,
                domain: 0,
                api: 0,
                adminUi: 0,
                docs: 0,
                ci: 0,
                refactor: 0,
                fixes: 0,
                tests: 0,
                research: 0,
                other: 0,
                warnings: []
              };
            }

            function hasActivity(state) {
              return (
                state.backend > 0 ||
                state.domain > 0 ||
                state.api > 0 ||
                state.adminUi > 0 ||
                state.docs > 0 ||
                state.ci > 0 ||
                state.refactor > 0 ||
                state.fixes > 0 ||
                state.tests > 0 ||
                state.research > 0 ||
                state.other > 0
              );
            }

            function buildAccomplished(state) {
              const lines = [];

              if (state.backend > 0) {
                lines.push('- Advanced backend implementation work across active development branches.');
              }
              if (state.domain > 0) {
                lines.push('- Continued domain modeling and core service design work.');
              }
              if (state.api > 0) {
                lines.push('- Refined API and integration-facing implementation details.');
              }
              if (state.adminUi > 0) {
                lines.push('- Progressed internal/admin user interface work.');
              }
              if (state.refactor > 0) {
                lines.push('- Improved maintainability through refactoring and internal cleanup.');
              }
              if (state.fixes > 0) {
                lines.push('- Addressed stability and bug-fix work in ongoing development areas.');
              }
              if (state.tests > 0) {
                lines.push('- Strengthened validation and quality through test-related work.');
              }
              if (state.ci > 0) {
                lines.push('- Improved development workflow and automation support.');
              }
              if (state.docs > 0) {
                lines.push('- Updated internal technical documentation and architecture notes.');
              }
              if (state.research > 0) {
                lines.push('- Continued research and technical exploration for upcoming implementation decisions.');
              }
              if (state.other > 0) {
                lines.push('- Made additional implementation progress across active branches.');
              }

              if (!lines.length) {
                lines.push('- (no commits found in this period)');
              }

              return lines.join('\n');
            }

            function buildInProgress(state) {
              const lines = [];

              if (hasActivity(state)) {
                lines.push('- Continued implementation work across active private development branches.');
              }
              if (state.domain > 0 || state.backend > 0 || state.api > 0) {
                lines.push('- Ongoing refinement of backend architecture, domain boundaries, and service behavior.');
              }
              if (state.adminUi > 0) {
                lines.push('- Internal UI/admin-facing improvements remain in progress.');
              }

              if (!lines.length) {
                lines.push('- (update ongoing work here)');
              }

              return Array.from(new Set(lines)).join('\n');
            }

            function buildLearned(state) {
              const lines = [];

              if (hasActivity(state)) {
                lines.push('- Weekly progress is better represented by active development branches than by release-only branches.');
                lines.push('- Public-facing devlogs are safer and more useful when private implementation details are summarized at a higher level.');
              }
              if (state.refactor > 0 || state.domain > 0) {
                lines.push('- Ongoing work reinforced the value of keeping architecture and implementation boundaries explicit.');
              }
              if (state.ci > 0) {
                lines.push('- Automation workflows benefit from stricter repository and branch assumptions.');
              }

              if (!lines.length) {
                lines.push('- (reflect on key learnings from this week)');
              }

              return Array.from(new Set(lines)).join('\n');
            }

            function buildNotes(state) {
              const lines = [];

              if (state.warnings.length) {
                lines.push('## ⚠️ Notes');
                lines.push(...state.warnings);
                return lines.join('\n');
              }

              if (hasActivity(state)) {
                lines.push('## ⚠️ Notes');
                lines.push('- Private repository activity is intentionally summarized at a high level.');
                return lines.join('\n');
              }

              return '';
            }

            function buildMarkdown(state, weekStart, createdDate) {
              const year = weekStart.getUTCFullYear();
              const month = String(weekStart.getUTCMonth() + 1).padStart(2, '0');
              const monthName = monthNameUTC(weekStart);
              const weekNumber = getMonthWeekNumber(weekStart);

              const notes = buildNotes(state);

              return {
                filename: `${year}-${month}-week-${String(weekNumber).padStart(2, '0')}.md`,
                content: [
                  `# Week ${weekNumber} – ${monthName} ${year}`,
                  '',
                  `_Date created:_ ${createdDate}`,
                  '',
                  '## ✅ What I accomplished',
                  buildAccomplished(state),
                  '',
                  '## 🔧 In progress',
                  buildInProgress(state),
                  '',
                  '## 🧠 What I learned',
                  buildLearned(state),
                  notes ? `\n${notes}` : ''
                ].join('\n').trimEnd() + '\n'
              };
            }

            core.info(`Loading repository metadata for ${target.owner}/${target.repo}`);

            const repoResponse = await github.rest.repos.get({
              owner: target.owner,
              repo: target.repo
            });

            const repoCreatedAt = new Date(repoResponse.data.created_at);
            const now = new Date();
            const since = repoCreatedAt.toISOString();

            core.info(`Repository created at: ${repoResponse.data.created_at}`);

            const branches = await github.paginate(
              github.rest.repos.listBranches,
              {
                owner: target.owner,
                repo: target.repo,
                per_page: 100
              }
            );

            const includedBranches = branches
              .map(b => b.name)
              .filter(name => shouldIncludeBranch(name));

            core.info(`Included branches: ${includedBranches.join(', ') || '(none)'}`);

            if (!includedBranches.length) {
              throw new Error('No matching branches found to process.');
            }

            const weeks = new Map();
            const seenShas = new Set();

            for (const branchName of includedBranches) {
              try {
                core.info(`Reading commits from branch ${branchName}`);

                const commits = await github.paginate(
                  github.rest.repos.listCommits,
                  {
                    owner: target.owner,
                    repo: target.repo,
                    sha: branchName,
                    since,
                    per_page: 100
                  }
                );

                core.info(`Found ${commits.length} commits in branch ${branchName}`);

                for (const c of commits) {
                  const sha = c.sha;
                  if (!sha || seenShas.has(sha)) {
                    continue;
                  }

                  seenShas.add(sha);

                  const msg = normalizeMessage(c.commit?.message || '');
                  const commitDateRaw = c.commit?.author?.date || c.commit?.committer?.date;
                  if (!msg || !commitDateRaw) {
                    continue;
                  }

                  const commitDate = new Date(commitDateRaw);
                  const weekStart = startOfWeekUTC(commitDate);
                  const weekKey = formatDateUTC(weekStart);

                  if (!weeks.has(weekKey)) {
                    weeks.set(weekKey, makeWeekState());
                  }

                  const state = weeks.get(weekKey);
                  const category = detectPrivateCategory(msg, branchName);
                  state[category] += 1;
                }
              } catch (error) {
                const message = error?.message || 'Unknown branch read error';
                core.warning(`Failed to read branch ${branchName}: ${message}`);
              }
            }

            const backfillStart = startOfWeekUTC(repoCreatedAt);
            const backfillEnd = startOfWeekUTC(now);

            let createdCount = 0;

            for (
              let cursor = new Date(backfillStart.getTime());
              cursor <= backfillEnd;
              cursor = addDaysUTC(cursor, 7)
            ) {
              const weekKey = formatDateUTC(cursor);
              const state = weeks.get(weekKey) || makeWeekState();

              const markdown = buildMarkdown(state, cursor, formatDateUTC(now));
              const outputPath = path.join('changelog', markdown.filename);

              fs.writeFileSync(outputPath, markdown.content, 'utf8');
              createdCount += 1;
              core.info(`Wrote ${outputPath}`);
            }

            core.setOutput('created_count', String(createdCount));
            core.setOutput('week_count', String(createdCount));
            core.setOutput('branch_count', String(includedBranches.length));
            core.setOutput('commit_count', String(seenShas.size));

      - name: Commit and push generated changelogs
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "ba1u-bot"
          git config user.email "actions@users.noreply.github.com"

          git add changelog/

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore(devlog): backfill changelog from private repo history"
          git push

      - name: Print summary
        shell: bash
        run: |
          echo "Weeks generated: ${{ steps.build.outputs.week_count }}"
          echo "Branches scanned: ${{ steps.build.outputs.branch_count }}"
          echo "Unique commits scanned: ${{ steps.build.outputs.commit_count }}"
