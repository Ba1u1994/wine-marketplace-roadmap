name: DevLog Backfill (V3)

on:
  workflow_dispatch:

jobs:
  backfill-devlogs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Roadmap Repo
        uses: actions/checkout@v4

      - name: Generate DevLogs (V3)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = 'wine-online-store';
            const repo = 'wine-marketplace';

            const commits = await github.paginate(
              github.rest.repos.listCommits,
              {
                owner,
                repo,
                per_page: 100,
              }
            );

            function getWeekKey(date) {
              const d = new Date(date);
              const year = d.getFullYear();
              const firstDay = new Date(year, 0, 1);
              const pastDays = Math.floor((d - firstDay) / 86400000);
              const week = Math.ceil((pastDays + firstDay.getDay() + 1) / 7);
              const month = String(d.getMonth() + 1).padStart(2, '0');
              return `${year}-${month}-week-${String(week).padStart(2, '0')}`;
            }

            function detectArea(msg) {
              const m = msg.toLowerCase();

              if (m.match(/identity|auth|jwt|token|session|user|role/)) return 'Identity Service';
              if (m.match(/catalog|wine|winery|region|grape/)) return 'Catalog Service';
              if (m.match(/order|cart|checkout/)) return 'Orders Service';
              if (m.match(/payment|transaction|provider/)) return 'Payments Service';
              if (m.match(/delivery|shipment|tracking/)) return 'Delivery Service';
              if (m.match(/react|frontend|ui|page|component/)) return 'Web Frontend';
              if (m.match(/admin|dashboard|management/)) return 'Admin Frontend';
              if (m.match(/gateway|ocelot|proxy/)) return 'API Gateway';
              if (m.match(/valueobject|aggregate|shared|result|stronglytyped/)) return 'Shared Building Blocks';
              if (m.match(/docker|ci|cd|pipeline|workflow|env|deploy/)) return 'Infrastructure / DevOps';
              if (m.match(/doc|readme|adr|architecture|roadmap/)) return 'Architecture / Documentation';

              return 'Backend Service';
            }

            function detectSubArea(msg) {
              const m = msg.toLowerCase();

              if (m.match(/refresh token|session|token/)) return 'Token / Session Management';
              if (m.match(/role|permission|rbac/)) return 'Authorization';
              if (m.match(/wine image|image|sort/)) return 'Catalog Media';
              if (m.match(/repository|migration|db|context/)) return 'Persistence';
              if (m.match(/api|endpoint|contract/)) return 'API Contracts';
              if (m.match(/docker|compose/)) return 'Environment Setup';
              if (m.match(/test|validation/)) return 'Testing / Validation';
              if (m.match(/value object|aggregate|entity/)) return 'Domain Modeling';

              return 'General';
            }

            function detectAction(msg) {
              const m = msg.toLowerCase();

              if (m.startsWith('feat')) return 'Application Flow';
              if (m.startsWith('fix')) return 'Refactoring';
              if (m.startsWith('refactor')) return 'Refactoring';
              if (m.startsWith('docs')) return 'Documentation';
              if (m.startsWith('test')) return 'Testing';
              if (m.startsWith('ci')) return 'Automation';

              if (m.match(/security|auth|token/)) return 'Security';
              if (m.match(/repository|db|migration/)) return 'Persistence';
              if (m.match(/api|endpoint/)) return 'API Contract';
              if (m.match(/model|entity|aggregate/)) return 'Domain Modeling';

              return 'Application Flow';
            }

            function buildAccomplished(items) {
              const lines = [];

              items.forEach(([key]) => {
                const [area, sub, action] = key.split('__');

                lines.push(
                  `${action} improvements in ${area} around ${sub.toLowerCase()}.`
                );
              });

              lines.push(
                'This week’s work reflects ongoing refinement of service boundaries, persistence concerns, and API behavior.'
              );

              return lines.slice(0, 5);
            }

            function buildLearned(items) {
              const lessons = [];

              const keys = items.map(i => i[0].toLowerCase()).join(' ');

              if (keys.includes('identity') && keys.includes('persistence')) {
                lessons.push('Identity-related work highlighted the importance of keeping token and session logic outside core domain models.');
              }

              if (keys.includes('catalog') && keys.includes('api')) {
                lessons.push('Catalog work reinforced that strong domain modeling simplifies API contract design.');
              }

              if (keys.includes('shared') || keys.includes('value')) {
                lessons.push('Shared building blocks must remain minimal and avoid leaking domain-specific logic.');
              }

              if (lessons.length === 0) {
                lessons.push('This week reinforced the importance of aligning architecture decisions with long-term maintainability.');
              }

              return lessons.slice(0, 3);
            }

            function inferNextProgress(currentKey, weeks) {
              const keys = Object.keys(weeks).sort();
              const idx = keys.indexOf(currentKey);

              if (idx === -1 || idx === keys.length - 1) return [];

              const next = weeks[keys[idx + 1]];
              const areas = new Set();

              next.forEach(([k]) => {
                const [area] = k.split('__');
                areas.add(area);
              });

              return Array.from(areas).slice(0, 2).map(a =>
                `Ongoing work appears to continue in ${a}.`
              );
            }

            const weeks = {};

            for (const commit of commits) {
              const date = commit.commit.author.date;
              const msg = commit.commit.message;

              const weekKey = getWeekKey(date);
              const area = detectArea(msg);
              const sub = detectSubArea(msg);
              const action = detectAction(msg);

              const key = `${area}__${sub}__${action}`;

              if (!weeks[weekKey]) weeks[weekKey] = {};
              if (!weeks[weekKey][key]) weeks[weekKey][key] = 0;

              weeks[weekKey][key]++;
            }

            const fs = require('fs');

            for (const [weekKey, data] of Object.entries(weeks)) {

              const sorted = Object.entries(data)
                .sort((a, b) => b[1] - a[1]);

              const accomplished = buildAccomplished(sorted);
              const learned = buildLearned(sorted);
              const progress = inferNextProgress(weekKey, weeks);

              const content = `
# ${weekKey}

_Date created: ${new Date().toISOString().split('T')[0]}_

## ✅ What I accomplished
${accomplished.map(l => `- ${l}`).join('\n')}

## 🔧 In progress
${progress.map(l => `- ${l}`).join('\n')}

## 🧠 What I learned
${learned.map(l => `- ${l}`).join('\n')}
`;

              fs.writeFileSync(`${weekKey}.md`, content.trim());
            }

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "chore(devlog): regenerate changelogs (V3)"
          git push
