name: DevLog Backfill (V3.1)

on:
  workflow_dispatch:

jobs:
  backfill-devlogs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Roadmap Repo
        uses: actions/checkout@v4

      - name: Generate DevLogs (V3.1)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = 'wine-online-store';
            const repo = 'wine-marketplace';

            const commits = await github.paginate(
              github.rest.repos.listCommits,
              {
                owner,
                repo,
                per_page: 100,
              }
            );

            // ---------------------------
            // WEEK GROUPING
            // ---------------------------
            function getWeekKey(date) {
              const d = new Date(date);
              const year = d.getFullYear();
              const firstDay = new Date(year, 0, 1);
              const pastDays = Math.floor((d - firstDay) / 86400000);
              const week = Math.ceil((pastDays + firstDay.getDay() + 1) / 7);
              const month = String(d.getMonth() + 1).padStart(2, '0');
              return `${year}-${month}-week-${String(week).padStart(2, '0')}`;
            }

            // ---------------------------
            // DETECTION LAYER
            // ---------------------------
            function detectArea(msg) {
              const m = msg.toLowerCase();

              if (m.match(/identity|auth|jwt|token|session|user|role/)) return 'Identity Service';
              if (m.match(/catalog|wine|winery|region|grape/)) return 'Catalog Service';
              if (m.match(/order|cart|checkout/)) return 'Orders Service';
              if (m.match(/payment|transaction|provider/)) return 'Payments Service';
              if (m.match(/delivery|shipment|tracking/)) return 'Delivery Service';
              if (m.match(/react|frontend|ui|page|component/)) return 'Web Frontend';
              if (m.match(/admin|dashboard/)) return 'Admin Frontend';
              if (m.match(/gateway|ocelot/)) return 'API Gateway';
              if (m.match(/valueobject|aggregate|result|stronglytyped/)) return 'Shared Building Blocks';
              if (m.match(/docker|ci|cd|pipeline|workflow|env/)) return 'Infrastructure / DevOps';
              if (m.match(/doc|readme|adr|architecture|roadmap/)) return 'Architecture / Documentation';

              return 'Backend Service';
            }

            function detectSubArea(msg) {
              const m = msg.toLowerCase();

              if (m.match(/refresh token|session/)) return 'token and session management';
              if (m.match(/role|permission|rbac/)) return 'authorization and access control';
              if (m.match(/wine image|image|sort/)) return 'media and image handling';
              if (m.match(/repository|migration|db|context/)) return 'persistence and data access';
              if (m.match(/api|endpoint|contract/)) return 'API contracts';
              if (m.match(/docker|compose/)) return 'environment setup';
              if (m.match(/test|validation/)) return 'testing and validation';
              if (m.match(/aggregate|entity|model/)) return 'domain modeling';

              return 'core functionality';
            }

            function detectAction(msg) {
              const m = msg.toLowerCase();

              if (m.startsWith('feat')) return 'implemented';
              if (m.startsWith('fix')) return 'fixed';
              if (m.startsWith('refactor')) return 'refactored';
              if (m.startsWith('docs')) return 'documented';
              if (m.startsWith('test')) return 'tested';
              if (m.startsWith('ci')) return 'automated';

              if (m.match(/security|auth|token/)) return 'strengthened';
              if (m.match(/repository|db|migration/)) return 'improved';
              if (m.match(/api|endpoint/)) return 'refined';
              if (m.match(/model|aggregate/)) return 'modeled';

              return 'worked on';
            }

            function detectTech(msg) {
              const m = msg.toLowerCase();

              const tech = [];

              if (m.includes('jwt')) tech.push('JWT');
              if (m.includes('token')) tech.push('refresh token strategies');
              if (m.includes('ef') || m.includes('db')) tech.push('EF Core');
              if (m.includes('docker')) tech.push('Docker');
              if (m.includes('repository')) tech.push('repository pattern');
              if (m.includes('cqrs')) tech.push('CQRS');

              return tech;
            }

            // ---------------------------
            // BUILD NARRATIVE
            // ---------------------------
            function buildAccomplished(items) {
              const lines = [];
              const techSet = new Set();

              items.slice(0, 4).forEach(([key]) => {
                const [area, sub, action] = key.split('__');

                const sentence = `${action} parts of the ${area} focusing on ${sub}.`;
                lines.push(sentence);
              });

              items.forEach(([key]) => {
                detectTech(key).forEach(t => techSet.add(t));
              });

              if (techSet.size > 0) {
                lines.push(
                  `This week also involved working with ${Array.from(techSet).join(', ')}.`
                );
              }

              lines.push(
                'Overall, this week contributed to strengthening core architecture boundaries and improving system clarity.'
              );

              return lines;
            }

            function buildLearned(items) {
              const lessons = [];
              const text = items.map(i => i[0]).join(' ').toLowerCase();

              if (text.includes('identity') && text.includes('persistence')) {
                lessons.push('Working on identity and persistence clarified how authentication data should remain outside core domain models.');
              }

              if (text.includes('catalog') && text.includes('api')) {
                lessons.push('Catalog work showed that better domain modeling leads to cleaner and more predictable API contracts.');
              }

              if (text.includes('shared')) {
                lessons.push('Shared components are most effective when they stay minimal and avoid domain-specific responsibilities.');
              }

              if (lessons.length === 0) {
                lessons.push('This week reinforced the importance of aligning implementation decisions with long-term architectural goals.');
              }

              return lessons;
            }

            function inferNextProgress(currentKey, weeks) {
              const keys = Object.keys(weeks).sort();
              const idx = keys.indexOf(currentKey);

              if (idx === -1 || idx === keys.length - 1) return [];

              const next = weeks[keys[idx + 1]];
              const areas = new Set();

              next.forEach(([k]) => {
                const [area] = k.split('__');
                areas.add(area);
              });

              return Array.from(areas).slice(0, 2).map(a =>
                `Work is expected to continue in ${a}, building on the current progress.`
              );
            }

            // ---------------------------
            // AGGREGATION
            // ---------------------------
            const weeks = {};

            for (const commit of commits) {
              const date = commit.commit.author.date;
              const msg = commit.commit.message;

              const weekKey = getWeekKey(date);
              const area = detectArea(msg);
              const sub = detectSubArea(msg);
              const action = detectAction(msg);

              const key = `${area}__${sub}__${action}`;

              if (!weeks[weekKey]) weeks[weekKey] = {};
              if (!weeks[weekKey][key]) weeks[weekKey][key] = 0;

              weeks[weekKey][key]++;
            }

            const fs = require('fs');

            for (const [weekKey, data] of Object.entries(weeks)) {

              const sorted = Object.entries(data)
                .sort((a, b) => b[1] - a[1]);

              const accomplished = buildAccomplished(sorted);
              const learned = buildLearned(sorted);
              const progress = inferNextProgress(weekKey, weeks);

              const content = `
# ${weekKey}

_Date created: ${new Date().toISOString().split('T')[0]}_

## ✅ What I accomplished
${accomplished.map(l => `- ${l}`).join('\n')}

## 🔧 In progress
${progress.map(l => `- ${l}`).join('\n')}

## 🧠 What I learned
${learned.map(l => `- ${l}`).join('\n')}
`;

              fs.writeFileSync(`${weekKey}.md`, content.trim());
            }

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "chore(devlog): regenerate changelogs (V3.1)"
          git push
