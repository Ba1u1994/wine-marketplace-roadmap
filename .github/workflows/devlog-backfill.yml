name: devlog backfill from private repo history

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure changelog directory exists
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p changelog

      - name: Generate changelog files from full private history
        id: build
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DEVLOG_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const target = {
              owner: 'wine-online-store',
              repo: 'wine-marketplace',
              includeBranchPatterns: [
                /^main$/i,
                /^develop$/i,
                /^feature\//i,
                /^bugfix\//i,
                /^hotfix\//i,
                /^release\//i
              ],
              excludeBranchPatterns: [
                /^gh-pages$/i,
                /^dependabot\//i
              ]
            };

            function matchesAny(name, patterns) {
              return patterns.some((p) => p.test(name));
            }

            function shouldIncludeBranch(branchName) {
              if (matchesAny(branchName, target.excludeBranchPatterns || [])) {
                return false;
              }
              if (!target.includeBranchPatterns?.length) {
                return true;
              }
              return matchesAny(branchName, target.includeBranchPatterns);
            }

            function normalizeMessage(msgFull) {
              return (msgFull || '').split('\n')[0].trim();
            }

            function startOfWeekUTC(dateObj) {
              const d = new Date(Date.UTC(
                dateObj.getUTCFullYear(),
                dateObj.getUTCMonth(),
                dateObj.getUTCDate()
              ));
              const day = d.getUTCDay(); // 0=Sun, 1=Mon
              const diff = day === 0 ? -6 : 1 - day;
              d.setUTCDate(d.getUTCDate() + diff);
              d.setUTCHours(0, 0, 0, 0);
              return d;
            }

            function addDaysUTC(dateObj, days) {
              const d = new Date(dateObj.getTime());
              d.setUTCDate(d.getUTCDate() + days);
              return d;
            }

            function formatDateUTC(dateObj) {
              return dateObj.toISOString().slice(0, 10);
            }

            function monthNameUTC(dateObj) {
              return dateObj.toLocaleString('en-US', {
                month: 'long',
                timeZone: 'UTC'
              });
            }

            function getMonthWeekNumber(weekStart) {
              const year = weekStart.getUTCFullYear();
              const month = weekStart.getUTCMonth();

              let cursor = new Date(Date.UTC(year, month, 1));
              cursor = startOfWeekUTC(cursor);

              let week = 1;
              while (cursor.getTime() < weekStart.getTime()) {
                cursor = addDaysUTC(cursor, 7);
                week++;
              }

              return week;
            }

            function unique(arr) {
              return Array.from(new Set(arr));
            }

            function scoreMatch(text, rules) {
              let score = 0;
              for (const r of rules) {
                if (r.test(text)) score++;
              }
              return score;
            }

            function detectArea(text) {
              const candidates = [
                {
                  area: 'Identity',
                  rules: [/identity/i, /auth/i, /authentication/i, /authorization/i, /jwt/i, /refresh token/i, /session/i, /user/i, /role/i, /permission/i]
                },
                {
                  area: 'Catalog',
                  rules: [/catalog/i, /wine/i, /winery/i, /region/i, /appellation/i, /grape/i, /vintage/i]
                },
                {
                  area: 'Orders',
                  rules: [/order/i, /cart/i, /checkout/i]
                },
                {
                  area: 'Payments',
                  rules: [/payment/i, /transaction/i, /billing/i]
                },
                {
                  area: 'Delivery',
                  rules: [/delivery/i, /shipment/i, /shipping/i, /tracking/i]
                },
                {
                  area: 'Frontend',
                  rules: [/frontend/i, /react/i, /vite/i, /typescript/i, /page/i, /component/i, /ui/i]
                },
                {
                  area: 'Admin UI',
                  rules: [/admin/i, /dashboard/i, /panel/i]
                },
                {
                  area: 'API',
                  rules: [/api/i, /endpoint/i, /controller/i, /contract/i, /swagger/i]
                },
                {
                  area: 'Persistence',
                  rules: [/ef core/i, /dbcontext/i, /migration/i, /sql/i, /database/i, /repository/i, /persistence/i]
                },
                {
                  area: 'Infrastructure',
                  rules: [/docker/i, /compose/i, /infra/i, /infrastructure/i, /configuration/i, /settings/i]
                },
                {
                  area: 'CI/CD',
                  rules: [/github action/i, /workflow/i, /pipeline/i, /\bci\b/i, /\bcd\b/i]
                },
                {
                  area: 'Documentation',
                  rules: [/docs/i, /readme/i, /adr/i, /roadmap/i, /architecture/i, /documentation/i]
                },
                {
                  area: 'Testing',
                  rules: [/test/i, /tests/i, /spec/i, /coverage/i]
                }
              ];

              let best = { area: 'Core backend', score: 0 };
              for (const c of candidates) {
                const score = scoreMatch(text, c.rules);
                if (score > best.score) {
                  best = { area: c.area, score };
                }
              }
              return best.area;
            }

            function detectAction(text) {
              const lower = text.toLowerCase();

              if (/^feat(\(.+\))?:/i.test(text)) return 'feature';
              if (/^fix(\(.+\))?:/i.test(text)) return 'fix';
              if (/^refactor(\(.+\))?:/i.test(text)) return 'refactor';
              if (/^docs?(\(.+\))?:/i.test(text)) return 'docs';
              if (/^chore(\(.+\))?:/i.test(text)) return 'chore';
              if (/^ci(\(.+\))?:/i.test(text)) return 'ci';
              if (/^tests?(\(.+\))?:/i.test(text)) return 'test';

              if (/aggregate|entity|valueobject|value-object|domain/i.test(lower)) return 'domain-modeling';
              if (/endpoint|controller|contract|swagger|api/i.test(lower)) return 'api-design';
              if (/migration|dbcontext|repository|sql|database|persistence/i.test(lower)) return 'persistence';
              if (/docker|workflow|pipeline|github actions?|ci/i.test(lower)) return 'automation';
              if (/research|spike|investigate|explore/i.test(lower)) return 'research';
              if (/learn|lesson/i.test(lower)) return 'learning';
              return 'implementation';
            }

            function detectTechniques(text) {
              const patterns = [
                ['Clean Architecture', /clean architecture/i],
                ['DDD', /\bddd\b/i],
                ['CQRS', /\bcqrs\b/i],
                ['MediatR', /mediatr/i],
                ['EF Core', /ef core|dbcontext|migration/i],
                ['JWT', /\bjwt\b/i],
                ['Refresh Tokens', /refresh token/i],
                ['Role-based Authorization', /role|permission|authorization/i],
                ['Repository Pattern', /repository/i],
                ['Domain Modeling', /aggregate|entity|valueobject|value-object|domain/i],
                ['API Contracts', /contract|endpoint|swagger|controller/i],
                ['Docker', /docker|compose/i],
                ['GitHub Actions', /github actions?|workflow/i],
                ['React', /\breact\b/i],
                ['TypeScript', /typescript/i],
                ['SQL', /\bsql\b|database/i],
                ['Validation', /validation|validator/i],
                ['Testing', /test|spec|coverage/i]
              ];

              return patterns
                .filter(([_, regex]) => regex.test(text))
                .map(([name]) => name);
            }

            function detectLearningSignals(text) {
              const signals = [];

              if (/refactor|cleanup|restructure/i.test(text)) {
                signals.push('Refactoring work highlighted the value of keeping boundaries and responsibilities explicit.');
              }
              if (/aggregate|entity|valueobject|domain|catalog|identity|orders/i.test(text)) {
                signals.push('Domain-oriented work reinforced the importance of modeling business concepts explicitly instead of leaking infrastructure concerns inward.');
              }
              if (/endpoint|contract|controller|api|swagger/i.test(text)) {
                signals.push('API-related work emphasized the need for stable contracts and clearer service boundaries.');
              }
              if (/migration|dbcontext|repository|database|sql|persistence|ef core/i.test(text)) {
                signals.push('Persistence work reinforced the importance of keeping data access aligned with application and domain boundaries.');
              }
              if (/workflow|pipeline|github actions?|ci|docker/i.test(text)) {
                signals.push('Tooling and automation work showed how much delivery quality depends on repeatable workflows and environment consistency.');
              }
              if (/test|spec|coverage/i.test(text)) {
                signals.push('Test-related work reinforced the value of validating behavior early instead of relying only on manual verification.');
              }
              if (/auth|identity|jwt|refresh token|authorization|role|permission/i.test(text)) {
                signals.push('Authentication and authorization work highlighted the need to design security concerns deliberately rather than treating them as thin plumbing.');
              }

              return signals;
            }

            function summarizeCommit(msg, branch) {
              const text = `${branch} ${msg}`;
              const area = detectArea(text);
              const action = detectAction(msg);
              const techniques = detectTechniques(text);
              const learningSignals = detectLearningSignals(text);

              return {
                area,
                action,
                techniques,
                learningSignals,
                raw: msg
              };
            }

            function makeWeekState() {
              return {
                commits: [],
                accomplishedSignals: {
                  areaAction: new Map(),
                  architecture: [],
                  techniques: [],
                  learnings: []
                },
                warnings: []
              };
            }

            function addAccomplishmentSignal(state, area, action, msg) {
              const key = `${area}__${action}`;
              if (!state.accomplishedSignals.areaAction.has(key)) {
                state.accomplishedSignals.areaAction.set(key, { area, action, count: 0, examples: [] });
              }
              const item = state.accomplishedSignals.areaAction.get(key);
              item.count += 1;
              if (item.examples.length < 2) {
                item.examples.push(msg);
              }
            }

            function addSignalsFromCommit(state, analyzed) {
              state.commits.push(analyzed);
              addAccomplishmentSignal(state, analyzed.area, analyzed.action, analyzed.raw);

              for (const tech of analyzed.techniques) {
                state.accomplishedSignals.techniques.push(tech);
              }
              for (const learning of analyzed.learningSignals) {
                state.accomplishedSignals.learnings.push(learning);
              }

              const lower = analyzed.raw.toLowerCase();
              if (/architecture|adr|boundary|aggregate|cqrs|clean architecture|ddd/i.test(lower)) {
                state.accomplishedSignals.architecture.push(analyzed.raw);
              }
            }

            function actionToPhrase(action, area) {
              const map = {
                'feature': `Implemented new functionality in ${area}.`,
                'fix': `Resolved defects and stabilized behavior in ${area}.`,
                'refactor': `Refined internal structure and maintainability in ${area}.`,
                'docs': `Expanded documentation related to ${area}.`,
                'chore': `Completed support and maintenance work around ${area}.`,
                'ci': `Improved automation and delivery workflow for ${area}.`,
                'test': `Added or improved automated verification around ${area}.`,
                'domain-modeling': `Advanced domain modeling decisions in ${area}.`,
                'api-design': `Refined API surface and contract decisions in ${area}.`,
                'persistence': `Improved persistence and data-access design in ${area}.`,
                'automation': `Strengthened tooling and automation around ${area}.`,
                'research': `Investigated technical direction and implementation options for ${area}.`,
                'learning': `Captured and applied new understanding while working in ${area}.`,
                'implementation': `Continued implementation work in ${area}.`
              };
              return map[action] || `Continued implementation work in ${area}.`;
            }

            function techniqueSentence(techniques) {
              if (!techniques.length) return null;
              const top = unique(techniques).slice(0, 4);
              return `This week’s work touched techniques and tools such as ${top.join(', ')}.`;
            }

            function buildAccomplished(state) {
              if (!state.commits.length) {
                return '- (no commits found in this period)';
              }

              const lines = [];
              const items = Array.from(state.accomplishedSignals.areaAction.values())
                .sort((a, b) => b.count - a.count || a.area.localeCompare(b.area))
                .slice(0, 6);

              for (const item of items) {
                lines.push(`- ${actionToPhrase(item.action, item.area)}`);
              }

              if (state.accomplishedSignals.architecture.length > 0) {
                const architectureHints = unique(
                  state.accomplishedSignals.architecture
                    .map(x => {
                      const lower = x.toLowerCase();
                      if (/aggregate|entity|valueobject|domain/i.test(lower)) {
                        return 'Architectural work this week included clarifying domain-model boundaries and business concepts.';
                      }
                      if (/cqrs|mediatr/i.test(lower)) {
                        return 'Architectural work this week reflected CQRS-style separation of behavior and request handling.';
                      }
                      if (/clean architecture|boundary|architecture/i.test(lower)) {
                        return 'Architectural work this week focused on enforcing clearer service and layer boundaries.';
                      }
                      if (/repository|persistence|migration|dbcontext/i.test(lower)) {
                        return 'Architectural work this week included persistence design decisions and data-access structure.';
                      }
                      return null;
                    })
                    .filter(Boolean)
                ).slice(0, 2);

                for (const hint of architectureHints) {
                  lines.push(`- ${hint}`);
                }
              }

              const techniqueLine = techniqueSentence(state.accomplishedSignals.techniques);
              if (techniqueLine) {
                lines.push(`- ${techniqueLine}`);
              }

              return unique(lines).join('\n');
            }

            function buildLearned(state) {
              if (!state.commits.length) {
                return '- (reflect on key learnings from this week)';
              }

              const learned = unique(state.accomplishedSignals.learnings).slice(0, 4);

              if (!learned.length) {
                const fallback = [];
                const techniqueLine = techniqueSentence(state.accomplishedSignals.techniques);
                if (techniqueLine) {
                  fallback.push(techniqueLine.replace("This week’s work touched", 'The work reinforced practical understanding of'));
                }
                fallback.push('Progress this week confirmed that meaningful delivery history depends on clear commit intent and explicit architectural decisions.');
                return unique(fallback).join('\n- ').replace(/^/, '- ');
              }

              return learned.map(x => `- ${x}`).join('\n');
            }

            function inferNextWeekProgress(nextState) {
              if (!nextState || !nextState.commits.length) {
                return '- (no clear follow-up activity inferred from the next week)';
              }

              const topAreas = Array.from(nextState.accomplishedSignals.areaAction.values())
                .sort((a, b) => b.count - a.count)
                .slice(0, 3);

              if (!topAreas.length) {
                return '- Continued work is expected to evolve from the current week’s implementation direction.';
              }

              const lines = topAreas.map(item => {
                switch (item.action) {
                  case 'domain-modeling':
                    return `- Ongoing work appears to continue in ${item.area}, especially around domain-model refinement and business structure.`;
                  case 'api-design':
                    return `- Ongoing work appears to continue in ${item.area}, with further API and contract refinement.`;
                  case 'persistence':
                    return `- Ongoing work appears to continue in ${item.area}, particularly in data-access and persistence design.`;
                  case 'test':
                    return `- Ongoing work appears to continue in ${item.area}, with stronger emphasis on validation and verification.`;
                  case 'refactor':
                    return `- Ongoing work appears to continue in ${item.area}, with further refactoring and structural cleanup.`;
                  case 'ci':
                  case 'automation':
                    return `- Ongoing work appears to continue in ${item.area}, especially around automation and workflow hardening.`;
                  default:
                    return `- Ongoing work appears to continue in ${item.area}, building on this implementation direction.`;
                }
              });

              return unique(lines).join('\n');
            }

            function buildNotes(state) {
              if (!state.commits.length) return '';
              return [
                '## ⚠️ Notes',
                '- This entry is reconstructed from repository history and commit messages.',
                '- Architectural details and lessons are inferred heuristically from commit intent rather than manual weekly journaling.'
              ].join('\n');
            }

            function buildMarkdown(state, nextState, weekStart, createdDate) {
              const year = weekStart.getUTCFullYear();
              const month = String(weekStart.getUTCMonth() + 1).padStart(2, '0');
              const monthName = monthNameUTC(weekStart);
              const weekNumber = getMonthWeekNumber(weekStart);

              const notes = buildNotes(state);

              return {
                filename: `${year}-${month}-week-${String(weekNumber).padStart(2, '0')}.md`,
                content: [
                  `# Week ${weekNumber} – ${monthName} ${year}`,
                  '',
                  `_Date created:_ ${createdDate}`,
                  '',
                  '## ✅ What I accomplished',
                  buildAccomplished(state),
                  '',
                  '## 🔧 In progress',
                  inferNextWeekProgress(nextState),
                  '',
                  '## 🧠 What I learned',
                  buildLearned(state),
                  notes ? `\n${notes}` : ''
                ].join('\n').trimEnd() + '\n'
              };
            }

            core.info(`Loading repository metadata for ${target.owner}/${target.repo}`);

            const repoResponse = await github.rest.repos.get({
              owner: target.owner,
              repo: target.repo
            });

            const repoCreatedAt = new Date(repoResponse.data.created_at);
            const now = new Date();
            const since = repoCreatedAt.toISOString();

            const branches = await github.paginate(
              github.rest.repos.listBranches,
              {
                owner: target.owner,
                repo: target.repo,
                per_page: 100
              }
            );

            const includedBranches = branches
              .map(b => b.name)
              .filter(name => shouldIncludeBranch(name));

            core.info(`Included branches: ${includedBranches.join(', ') || '(none)'}`);

            if (!includedBranches.length) {
              throw new Error('No matching branches found to process.');
            }

            const weeks = new Map();
            const seenShas = new Set();

            for (const branchName of includedBranches) {
              try {
                core.info(`Reading commits from branch ${branchName}`);

                const commits = await github.paginate(
                  github.rest.repos.listCommits,
                  {
                    owner: target.owner,
                    repo: target.repo,
                    sha: branchName,
                    since,
                    per_page: 100
                  }
                );

                core.info(`Found ${commits.length} commits in branch ${branchName}`);

                for (const c of commits) {
                  const sha = c.sha;
                  if (!sha || seenShas.has(sha)) continue;

                  seenShas.add(sha);

                  const msg = normalizeMessage(c.commit?.message || '');
                  const commitDateRaw = c.commit?.author?.date || c.commit?.committer?.date;
                  if (!msg || !commitDateRaw) continue;

                  const commitDate = new Date(commitDateRaw);
                  const weekStart = startOfWeekUTC(commitDate);
                  const weekKey = formatDateUTC(weekStart);

                  if (!weeks.has(weekKey)) {
                    weeks.set(weekKey, makeWeekState());
                  }

                  const state = weeks.get(weekKey);
                  const analyzed = summarizeCommit(msg, branchName);
                  addSignalsFromCommit(state, analyzed);
                }
              } catch (error) {
                const message = error?.message || 'Unknown branch read error';
                core.warning(`Failed to read branch ${branchName}: ${message}`);
              }
            }

            const backfillStart = startOfWeekUTC(repoCreatedAt);
            const backfillEnd = startOfWeekUTC(now);

            const orderedWeekStarts = [];
            for (
              let cursor = new Date(backfillStart.getTime());
              cursor <= backfillEnd;
              cursor = addDaysUTC(cursor, 7)
            ) {
              orderedWeekStarts.push(new Date(cursor.getTime()));
            }

            let createdCount = 0;

            for (let i = 0; i < orderedWeekStarts.length; i++) {
              const weekStart = orderedWeekStarts[i];
              const weekKey = formatDateUTC(weekStart);
              const nextWeekStart = orderedWeekStarts[i + 1];
              const nextWeekKey = nextWeekStart ? formatDateUTC(nextWeekStart) : null;

              const state = weeks.get(weekKey) || makeWeekState();
              const nextState = nextWeekKey ? (weeks.get(nextWeekKey) || makeWeekState()) : null;

              const markdown = buildMarkdown(state, nextState, weekStart, formatDateUTC(now));
              const outputPath = path.join('changelog', markdown.filename);

              fs.writeFileSync(outputPath, markdown.content, 'utf8');
              createdCount += 1;
              core.info(`Wrote ${outputPath}`);
            }

            core.setOutput('created_count', String(createdCount));
            core.setOutput('week_count', String(createdCount));
            core.setOutput('branch_count', String(includedBranches.length));
            core.setOutput('commit_count', String(seenShas.size));

      - name: Commit and push generated changelogs
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "ba1u-bot"
          git config user.email "actions@users.noreply.github.com"

          git add changelog/

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore(devlog): rebuild changelog from private repo history"
          git push

      - name: Print summary
        shell: bash
        run: |
          echo "Weeks generated: ${{ steps.build.outputs.week_count }}"
          echo "Branches scanned: ${{ steps.build.outputs.branch_count }}"
          echo "Unique commits scanned: ${{ steps.build.outputs.commit_count }}"
